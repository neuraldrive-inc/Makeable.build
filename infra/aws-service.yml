AWSTemplateFormatVersion: "2010-09-09"
Description: Always-warm Makeable ESP32 API on Amazon ECS Express Mode

Parameters:
  ImageIdentifier:
    Type: String
  ExecutionRoleArn:
    Type: String
  InfrastructureRoleArn:
    Type: String
  TaskRoleArn:
    Type: String
  OpenAISecretArn:
    Type: String
  DeepgramSecretArn:
    Type: String
  CognitoUserPoolId:
    Type: String
  CognitoClientId:
    Type: String
  CognitoDomain:
    Type: String
  CreditAccountsTable:
    Type: String
    Default: MakeableCreditAccounts
  CreditLedgerTable:
    Type: String
    Default: MakeableCreditLedger

Resources:
  CompilerCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: makeable

  CompilerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/makeable-esp32-api
      RetentionInDays: 14

  Service:
    Type: AWS::ECS::ExpressGatewayService
    DependsOn: CompilerLogGroup
    Properties:
      ServiceName: makeable-esp32-api
      Cluster: !GetAtt CompilerCluster.Arn
      ExecutionRoleArn: !Ref ExecutionRoleArn
      InfrastructureRoleArn: !Ref InfrastructureRoleArn
      TaskRoleArn: !Ref TaskRoleArn
      Cpu: "1024"
      Memory: "2048"
      HealthCheckPath: /api/health
      PrimaryContainer:
        Image: !Ref ImageIdentifier
        ContainerPort: 10000
        AwsLogsConfiguration:
          LogGroup: !Ref CompilerLogGroup
          LogStreamPrefix: ecs
        Environment:
          - Name: PORT
            Value: "10000"
          - Name: NODE_ENV
            Value: production
          - Name: ALLOWED_ORIGINS
            Value: https://makeable.build,https://www.makeable.build,https://test--makeable-build.netlify.app
          - Name: MAX_CONCURRENT_COMPILES
            Value: "1"
          - Name: ARDUINO_COMPILE_JOBS
            Value: "1"
          - Name: COMPILE_TIMEOUT_MS
            Value: "300000"
          - Name: OPENAI_MODEL
            Value: gpt-5.6-terra
          - Name: OPENAI_REASONING_MODEL
            Value: gpt-5.6-terra
          - Name: OPENAI_REASONING_EFFORT
            Value: xhigh
          - Name: OPENAI_SERVICE_TIER
            Value: priority
          - Name: AWS_REGION
            Value: !Ref AWS::Region
          - Name: COGNITO_USER_POOL_ID
            Value: !Ref CognitoUserPoolId
          - Name: COGNITO_CLIENT_ID
            Value: !Ref CognitoClientId
          - Name: COGNITO_DOMAIN
            Value: !Ref CognitoDomain
          - Name: COGNITO_REDIRECT_URI
            Value: https://makeable.build/pilot
          - Name: CREDIT_ACCOUNTS_TABLE
            Value: !Ref CreditAccountsTable
          - Name: CREDIT_LEDGER_TABLE
            Value: !Ref CreditLedgerTable
          - Name: INITIAL_FREE_CREDITS
            Value: "10"
        Secrets:
          - Name: OPENAI_API_KEY
            ValueFrom: !Ref OpenAISecretArn
          - Name: DEEPGRAM_API_KEY
            ValueFrom: !Ref DeepgramSecretArn
      ScalingTarget:
        MinTaskCount: 1
        MaxTaskCount: 1
        AutoScalingMetric: AVERAGE_CPU
        AutoScalingTargetValue: 60
      Tags:
        - Key: Project
          Value: Makeable
        - Key: Workload
          Value: ESP32Compiler

Outputs:
  ServiceArn:
    Value: !GetAtt Service.ServiceArn
  ServiceUrl:
    Value: !Sub https://${Service.Endpoint}
