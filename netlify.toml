[build]
  publish = "dist"
  functions = "netlify/functions"
  command = "node --check app.js && node --check landing.js && node --check lib/acquisition.mjs && node --check server.mjs && node --check netlify/functions/api.mjs && node scripts/build-static.mjs"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/pilot"
  to = "/pilot-app.html"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
