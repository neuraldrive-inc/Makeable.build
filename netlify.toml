[build]
  publish = "."
  functions = "netlify/functions"
  command = "node --check app.js && node --check server.mjs && node --check netlify/functions/api.mjs"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

