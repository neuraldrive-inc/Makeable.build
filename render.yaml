services:
  - type: web
    name: makeable-api
    runtime: docker
    plan: starter
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGINS
        value: https://makeable.build,https://www.makeable.build
      - key: OPENAI_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
