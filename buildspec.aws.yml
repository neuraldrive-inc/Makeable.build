version: 0.2

phases:
  pre_build:
    commands:
      - aws --version
      - AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
      - ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
      - aws ecr get-login-password --region "$AWS_DEFAULT_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
      - IMAGE_TAG="${CODEBUILD_RESOLVED_SOURCE_VERSION:-latest}"
      - docker pull "$ECR_REPOSITORY_URI:latest" || true
  build:
    commands:
      - |
        if [ "${FULL_TOOLCHAIN_REBUILD:-0}" = "1" ]; then
          DOCKER_BUILDKIT=1 docker build --platform linux/amd64 \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            --cache-from "$ECR_REPOSITORY_URI:latest" \
            --tag "$ECR_REPOSITORY_URI:$IMAGE_TAG" \
            --tag "$ECR_REPOSITORY_URI:latest" .
        else
          DOCKER_BUILDKIT=1 docker build --platform linux/amd64 \
            --file Dockerfile.runtime \
            --build-arg BASE_IMAGE="$ECR_REPOSITORY_URI:latest" \
            --tag "$ECR_REPOSITORY_URI:$IMAGE_TAG" \
            --tag "$ECR_REPOSITORY_URI:latest" .
        fi
  post_build:
    commands:
      - docker push "$ECR_REPOSITORY_URI:$IMAGE_TAG"
      - docker push "$ECR_REPOSITORY_URI:latest"
      - printf '{"image":"%s","tag":"%s"}\n' "$ECR_REPOSITORY_URI" "$IMAGE_TAG" > image-detail.json

artifacts:
  files:
    - image-detail.json
