<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f7f0e4" />
    <title>Makeable</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%23F15A44'/%3E%3Cpath d='M17 42V21l15 12 15-12v21' fill='none' stroke='%23FFFDF8' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to project builder</a>

    <header class="app-header" data-makeable-shell>
      <a class="makeable-brand" href="/" aria-label="Makeable home">
        <span aria-hidden="true">Makeable</span>
        <span class="visually-hidden">Makeable home</span>
        <span class="brand-spark" aria-hidden="true"></span>
      </a>

      <nav class="progress-rail" aria-label="Build progress">
        <ol>
          <li class="progress-step progress-step--describe" data-progress-step="describe" aria-current="step">
            <span class="progress-number" aria-hidden="true">1</span>
            <span>Describe</span>
          </li>
          <li class="progress-step progress-step--scan" data-progress-step="scan">
            <span class="progress-number" aria-hidden="true">2</span>
            <span>Scan Parts</span>
          </li>
          <li class="progress-step progress-step--build" data-progress-step="build">
            <span class="progress-number" aria-hidden="true">3</span>
            <span>Build + Code</span>
          </li>
          <li class="progress-step progress-step--test" data-progress-step="test">
            <span class="progress-number" aria-hidden="true">4</span>
            <span>Test</span>
          </li>
          <li class="progress-step progress-step--publish" data-progress-step="publish">
            <span class="progress-number" aria-hidden="true">5</span>
            <span>Publish</span>
          </li>
        </ol>
      </nav>
    </header>

    <main class="app-main" id="main-content" tabindex="-1">
      <section class="screen-outlet" data-screen-outlet aria-labelledby="makeable-heading">
        <h1 class="visually-hidden" id="makeable-heading" data-app-heading>Makeable</h1>
        <p class="app-status" id="appStatus" role="status" aria-live="polite">Loading Makeable…</p>
        <noscript>
          <p class="app-notice">Makeable needs JavaScript to guide your hardware build.</p>
        </noscript>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
